/* ================= AI CHATBOT ================= */

function ChatBot(){

const [open,setOpen]=useState(false)
const [messages,setMessages]=useState([])
const [input,setInput]=useState("")

async function send(){

if(!input) return

setMessages(m=>[...m,{role:"user",content:input}])

const res = await fetch(OPENROUTER_ENDPOINT,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENROUTER_API_KEY
},
body:JSON.stringify({
model:"meta-llama/llama-3-8b-instruct",
messages:[
{role:"system",content:"You are an ecommerce assistant"},
{role:"user",content:input}
]
})
})

const data = await res.json()

const reply =
data?.choices?.[0]?.message?.content ||
"⚠️ API Error"

setMessages(m=>[...m,{role:"assistant",content:reply}])

setInput("")

}

return(

<>

<button
onClick={()=>setOpen(!open)}
className="fixed bottom-6 right-6 bg-indigo-600 text-white p-4 rounded-full shadow-lg">

💬

</button>

{open && (

<div className="fixed bottom-24 right-6 bg-white w-80 shadow-xl rounded-xl flex flex-col">

<div className="bg-indigo-600 text-white p-3 rounded-t-xl">
AI Assistant
</div>

<div className="p-3 h-64 overflow-y-auto text-sm">

{messages.map((m,i)=>(
<div key={i} className={m.role==="user"?"text-right":"text-left"}>
<span className="inline-block bg-gray-100 p-2 rounded my-1">
{m.content}
</span>
</div>
))}

</div>

<div className="flex border-t">

<input
value={input}
onChange={e=>setInput(e.target.value)}
placeholder="Ask about products..."
className="flex-1 p-2 outline-none"
/>

<button
onClick={send}
className="bg-indigo-600 text-white px-4">
Send
</button>

</div>

</div>

)}

</>

)

}
